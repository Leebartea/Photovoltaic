services:
  - type: static
    name: pv-calculator-static
    runtime: static
    buildCommand: npm ci && node scripts/build_artifacts.js && npm run release:gate:free
    staticPublishPath: dist/web
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: pv-premium-sync
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run release:gate:premium
    startCommand: node --experimental-sqlite backend/server.js
    healthCheckPath: /health
    disk:
      name: premium-sync-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: BACKEND_ENTITLEMENT_SOURCE
        value: manual_admin
      - key: BACKEND_STORAGE_DRIVER
        value: sqlite
      - key: BACKEND_DATA_DIR
        value: /var/data
      - key: BACKEND_SQLITE_FILE
        value: /var/data/premium_sync.sqlite
      - key: BACKEND_ALLOWED_ORIGINS
        value: https://replace-me.example.com
      - key: BACKEND_API_KEY
        generateValue: true
      - key: BACKEND_ACTION_LINK_SECRET
        generateValue: true
      - key: BACKEND_SEAT_CODE_PEPPER
        generateValue: true
      - key: BACKEND_RECOVERY_CODE_PEPPER
        generateValue: true
      - key: BACKEND_BACKUP_ROOT_DIR
        value: /var/data/backups
      - key: BACKEND_BACKUP_SCHEDULE_CRON
        value: 10 2 * * *
      - key: BACKEND_BACKUP_KEEP_COUNT
        value: "14"
      - key: BACKEND_BACKUP_KEEP_DAYS
        value: "30"
      - key: BACKEND_BACKUP_OWNER
        value: Platform Ops
      - key: BACKEND_BACKUP_REVIEW_CHANNEL
        value: "#pv-premium-ops"
      - key: BACKEND_RESTORE_OWNER
        value: Staff Engineer
      - key: BACKEND_RESTORE_DRILL_CADENCE
        value: once-per-release
      - key: BACKEND_AUDIT_RETENTION_DAYS
        value: "90"
      - key: BACKEND_DELIVERY_RETENTION_DAYS
        value: "90"
      - key: BACKEND_APPROVAL_RETENTION_DAYS
        value: "120"
      - key: BACKEND_INCIDENT_OWNER
        value: On-call Lead
      - key: BACKEND_INCIDENT_CHANNEL
        value: "#pv-incidents"
      - key: BACKEND_INCIDENT_RUNBOOK_URL
        value: https://ops.example.com/runbooks/pv-premium
